<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Morning OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: #2a2a2e;
    --text: #f0ede8;
    --muted: #6b6870;
    --dim: #3d3b42;
    --amber: #e8a54b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 56px 28px 80px;
    max-width: 400px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  .header { margin-bottom: 32px; }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--text);
    margin-bottom: 16px;
  }
  .counter { display: flex; align-items: baseline; gap: 10px; }
  .counter-num {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: var(--amber);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .counter-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
  .divider { height: 1px; background: var(--border); margin: 28px 0 24px; }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .month-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .month-arrow {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--dim);
    border-radius: 6px;
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .month-arrow:hover { color: var(--amber); background: rgba(232,165,75,0.08); }
  .month-arrow.disabled { opacity: 0.2; pointer-events: none; }
  .day-names {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }
  .day-name {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--dim);
    padding-bottom: 4px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--dim);
    position: relative;
    transition: transform 0.12s, background 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-day.in-month { color: var(--muted); }
  .cal-day.tappable { cursor: pointer; }
  .cal-day.tappable:hover { background: var(--surface2); }
  .cal-day.tappable:active { transform: scale(0.87); }
  .cal-day.is-today {
    outline: 1.5px solid rgba(232,165,75,0.4);
    outline-offset: -1px;
  }
  .cal-day.checked { background: var(--amber); }
  .cal-day.checked:hover { background: var(--amber); }
  .day-num { font-variant-numeric: tabular-nums; }
  .cal-day.checked .day-num { display: none; }
  .cal-day.checked::before {
    content: '✓';
    font-size: 13px;
    font-weight: 700;
    color: #0d0d0f;
  }
  .star-badge {
    position: absolute;
    top: 0; right: 0;
    font-size: 9px;
    line-height: 1;
    pointer-events: none;
    transform: translate(25%, -25%);
  }
  .footer {
    margin-top: 44px;
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: color 0.15s;
  }
  .footer:hover { color: var(--muted); }
  .setup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    padding: 60px 28px 40px;
    overflow-y: auto;
    flex-direction: column;
    justify-content: center;
    max-width: 400px;
    margin: 0 auto;
  }
  .setup-overlay.visible { display: flex; }
  .setup-eyebrow {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }
  .setup-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-style: italic;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .setup-body {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .setup-body strong { color: var(--text); font-weight: 500; }
  .setup-body code {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    background: rgba(232,165,75,0.1);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .setup-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    width: 100%;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: var(--amber); }
  .setup-input::placeholder { color: var(--dim); }
  .setup-btn {
    background: rgba(232,165,75,0.1);
    border: 1px solid rgba(232,165,75,0.3);
    border-radius: 8px;
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 13px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .setup-btn:hover { background: var(--amber); color: #0d0d0f; }
  .setup-back {
    margin-top: 28px;
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  .setup-back:hover { color: var(--muted); }
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 9px 20px;
    font-size: 12px;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="setup-overlay" id="setup-overlay">
  <div class="setup-eyebrow">One-time setup</div>
  <div class="setup-title">Connect to GitHub</div>
  <div class="setup-body">
    Paste a GitHub Personal Access Token with <code>repo</code> scope to save your log to <strong>ellemvaish115/morning-routine-app</strong>.<br><br>
    Stored on this device only — never committed to the repo.
  </div>
  <input class="setup-input" id="setup-token-input" type="password" placeholder="github_pat_…" autocomplete="off" />
  <div class="setup-btn" onclick="connectGitHub()">Save &amp; Connect →</div>
  <div class="setup-back" onclick="closeSetup()">← Back</div>
</div>

<div class="header">
  <div class="header-title">Morning OS</div>
  <div class="counter">
    <div class="counter-num" id="counter-num">0</div>
    <div class="counter-label">days showed up</div>
  </div>
</div>

<div class="divider"></div>

<div class="month-nav">
  <div class="month-arrow" id="prev-month" onclick="changeMonth(-1)">‹</div>
  <div class="month-label" id="month-label">—</div>
  <div class="month-arrow" id="next-month" onclick="changeMonth(1)">›</div>
</div>

<div class="day-names">
  <div class="day-name">M</div>
  <div class="day-name">T</div>
  <div class="day-name">W</div>
  <div class="day-name">T</div>
  <div class="day-name">F</div>
  <div class="day-name">S</div>
  <div class="day-name">S</div>
</div>

<div class="cal-grid" id="cal-grid"></div>

<div class="footer" onclick="showSetup()">⚙ settings</div>

<div class="toast" id="toast"></div>

<script>
const GH_OWNER  = 'ellemvaish115';
const GH_REPO   = 'morning-routine-app';
const GH_API    = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents`;
const START_DATE = '2026-07-13';

function getToken() { return localStorage.getItem('gh_token') || ''; }
function b64enc(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64dec(str) { return decodeURIComponent(escape(atob(str))); }

async function ghGet(filename) {
  try {
    const res = await fetch(`${GH_API}/${filename}?t=${Date.now()}`, {
      headers: { Accept: 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) return { sha: null, content: null };
    if (!res.ok) return null;
    const json = await res.json();
    return { sha: json.sha, content: JSON.parse(b64dec(json.content.replace(/\n/g, ''))) };
  } catch { return null; }
}

async function ghPut(filename, content, sha) {
  const body = {
    message: `update ${filename}`,
    content: b64enc(JSON.stringify(content, null, 2)),
    ...(sha ? { sha } : {})
  };
  try {
    const res = await fetch(`${GH_API}/${filename}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${getToken()}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) { showToast('⚠ Save failed'); return null; }
    return (await res.json()).content.sha;
  } catch { showToast('⚠ Network error'); return null; }
}

let data     = {};
let dataSha  = null;
let saveTimer  = null;
let saveChain  = Promise.resolve();

function saveData() {
  if (!getToken()) { showSetup(); return; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveChain = saveChain.then(async () => {
      if (!dataSha) { const r = await ghGet('data.json'); if (r) dataSha = r.sha; }
      const sha = await ghPut('data.json', data, dataSha);
      if (sha) dataSha = sha;
    });
  }, 600);
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function mkKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function shiftKey(key, n) {
  const d = new Date(key + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return mkKey(d.getFullYear(), d.getMonth()+1, d.getDate());
}

function checkRunAt(key) {
  for (let i = 0; i < 10; i++) {
    if (!data[shiftKey(key, -i)]) return false;
  }
  return true;
}
function hasStar(key) {
  return !!(data._stars && data._stars[key]);
}

function updateCounter() {
  const count = Object.entries(data)
    .filter(([k, v]) => !k.startsWith('_') && v === true)
    .length;
  document.getElementById('counter-num').textContent = count;
}

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth() + 1;

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  if (viewMonth < 1)  { viewMonth = 12; viewYear--; }
  if (viewYear < 2026 || (viewYear === 2026 && viewMonth < 7)) {
    viewYear = 2026; viewMonth = 7;
  }
  renderCalendar();
}

function renderCalendar() {
  const todayK = todayKey();
  const now    = new Date();
  document.getElementById('month-label').textContent =
    `${MONTHS[viewMonth-1]} ${viewYear}`;
  const isMin = viewYear === 2026 && viewMonth === 7;
  const isMax = viewYear === now.getFullYear() && viewMonth === now.getMonth()+1;
  document.getElementById('prev-month').classList.toggle('disabled', isMin);
  document.getElementById('next-month').classList.toggle('disabled', isMax);
  const firstDow    = (new Date(viewYear, viewMonth-1, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for (let i = 0; i < firstDow; i++) {
    grid.appendChild(document.createElement('div'));
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key      = mkKey(viewYear, viewMonth, d);
    const future   = key > todayK;
    const preStart = key < START_DATE;
    const isToday  = key === todayK;
    const checked  = data[key] === true;
    const star     = hasStar(key);
    const tappable = !future && !preStart;
    const cell = document.createElement('div');
    cell.className = [
      'cal-day', 'in-month',
      tappable ? 'tappable' : '',
      isToday  ? 'is-today' : '',
      checked  ? 'checked'  : ''
    ].filter(Boolean).join(' ');
    if (future)   cell.style.opacity = '0.18';
    if (preStart) cell.style.opacity = '0.12';
    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);
    if (star) {
      const starEl = document.createElement('span');
      starEl.className = 'star-badge';
      starEl.textContent = '⭐';
      cell.appendChild(starEl);
    }
    if (tappable) cell.addEventListener('click', () => toggleDay(key));
    grid.appendChild(cell);
  }
}

function toggleDay(key) {
  if (data[key]) {
    delete data[key];
  } else {
    data[key] = true;
    if (checkRunAt(key)) {
      if (!data._stars) data._stars = {};
      data._stars[key] = true;
      showToast('⭐ 10 days in a row!');
    } else {
      showToast('Showed up ✓');
    }
  }
  renderCalendar();
  updateCounter();
  saveData();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function showSetup()  { document.getElementById('setup-overlay').classList.add('visible'); }
function closeSetup() {
  if (getToken()) document.getElementById('setup-overlay').classList.remove('visible');
}
function connectGitHub() {
  const t = document.getElementById('setup-token-input').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  document.getElementById('setup-overlay').classList.remove('visible');
  init();
}

async function init() {
  const r = await ghGet('data.json');
  if (r) { dataSha = r.sha; if (r.content) data = r.content; }
  updateCounter();
  renderCalendar();
  if (!getToken()) showSetup();
}

init();
</script>
</body>
</html>
